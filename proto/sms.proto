syntax = "proto3";

package sms;

option go_package = "./;pb";

message GetNumberRequest {
  string service = 1;    // 默认由 HEROSMS_SERVICE 控制，例如 ni (Gojek)
  int32 country = 2;     // 6 = Indonesia
  double max_price = 3;  // 最大价格，0.1
  int32 max_attempts = 4; // 最大尝试次数（检测可用性），默认5
  bool force_new_number = 5; // true 时忽略当前 active activation，直接再取一个新号
}

message GetNumberResponse {
  bool success = 1;
  string error_message = 2;
  string activation_id = 3;
  string phone = 4;        // 不含国家码
}

message WaitOTPRequest {
  string activation_id = 1;
  int32 timeout_seconds = 2;  // 默认 120
}

message WaitOTPResponse {
  bool success = 1;
  string error_message = 2;
  string code = 3;
}

message MarkSMSSentRequest {
  string activation_id = 1;
}

message MarkSMSSentResponse {
  bool success = 1;
  string error_message = 2;
  string raw_response = 3;
}

message RequestAdditionalSMSRequest {
  string activation_id = 1;
}

message RequestAdditionalSMSResponse {
  bool success = 1;
  string error_message = 2;
  string raw_response = 3;
}

message FinishActivationRequest {
  string activation_id = 1;
}

message FinishActivationResponse {
  bool success = 1;
  string error_message = 2;
  string raw_response = 3;
}

message CancelActivationRequest {
  string activation_id = 1;
}

message CancelActivationResponse {
  bool success = 1;
  string error_message = 2;
  string raw_response = 3;
}

message BalanceRequest {}

message BalanceResponse {
  string balance = 1;
}

service SMSService {
  rpc GetNumber(GetNumberRequest) returns (GetNumberResponse);
  rpc WaitOTP(WaitOTPRequest) returns (WaitOTPResponse);
  rpc MarkSMSSent(MarkSMSSentRequest) returns (MarkSMSSentResponse);
  rpc RequestAdditionalSMS(RequestAdditionalSMSRequest) returns (RequestAdditionalSMSResponse);
  rpc FinishActivation(FinishActivationRequest) returns (FinishActivationResponse);
  rpc CancelActivation(CancelActivationRequest) returns (CancelActivationResponse);
  rpc GetBalance(BalanceRequest) returns (BalanceResponse);
}
